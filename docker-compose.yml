services:
  chroma:
    image: chromadb/chroma:latest
    ports:
      - "8000:8000"
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      IS_PERSISTENT: "TRUE"
      ANONYMIZED_TELEMETRY: "FALSE"

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    ports:
      - "8001:8000"
    depends_on:
      - chroma
    env_file:
      - .env
    environment:
      CHROMA_HOST: chroma
      CHROMA_PORT: "8000"
    volumes:
      - ./data:/app/data
      - ./results:/app/results

  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    ports:
      - "8501:8501"
    depends_on:
      - api
    env_file:
      - .env
    environment:
      API_BASE_URL: "http://api:8000"

volumes:
  chroma_data:
